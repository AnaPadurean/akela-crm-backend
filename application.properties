# ===============================
#  Database Configuration
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# ===============================
#  JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=DEBUG

# ===============================
#  Server
# ===============================
server.port=8080


spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration


#==============================
#Flyway - versionare DB
#==============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=baseline-existing-db
spring.flyway.schemas=public

# JWT
akl.jwt.secret=${AKL_JWT_SECRET}
akl.jwt.expiration-seconds=${AKL_JWT_EXPIRATION_SECONDS}
akl.jwt.issuer=${AKL_JWT_ISSUER}


# Bootstrap admin (prima pornire)
akl.bootstrap.admin.email=${AKL_BOOTSTRAP_ADMIN_EMAIL}
akl.bootstrap.admin.password=${AKL_BOOTSTRAP_ADMIN_PASSWORD}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.frontend-url=${APP_FRONTEND_URL}

# Reset password
app.reset.token-ttl-minutes=${RESET_TOKEN_TTL_MINUTES}

# Mail "from"
app-mail.from=${APP_MAIL_FROM}

#  SMTP (Brevo)
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS}
spring.mail.default-encoding=UTF-8

